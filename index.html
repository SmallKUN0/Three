<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>坤坤的 Sodium 方块 启动器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #90EE90;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #main-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 18vh;
            position: relative;
        }

        .title {
            color: #FFFFFF;
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255,255,255,0.9), 0 0 40px rgba(255,255,255,0.6);
            line-height: 1.3;
            user-select: none;
            -webkit-user-select: none;
        }

        .title .emoji-fire {
            filter: brightness(3) saturate(0) drop-shadow(0 0 8px #FFFFFF) drop-shadow(0 0 16px #FFFFFF);
            display: inline-block;
        }

        .version-select-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 1.1rem;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            outline: none;
            margin-bottom: 25px;
            height: 48px;
            line-height: 1;
            min-width: 220px;
            user-select: none;
            -webkit-user-select: none;
            text-align: center;
            transition: all 0.15s ease;
            touch-action: manipulation;
        }

        .version-select-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .version-select-btn:active {
            background: rgba(255,255,255,0.4);
            transform: scale(0.96);
        }

        .launch-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 12px 50px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            height: 48px;
            line-height: 1;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .launch-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .launch-btn:active {
            background: rgba(255,255,255,0.4);
            transform: scale(0.96);
        }

        .copyright-text {
            color: #FFFFFF;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 16px;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.5);
            user-select: none;
            -webkit-user-select: none;
            opacity: 0.9;
        }

        .top-right-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.15);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            z-index: 10;
        }

        .top-right-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .top-right-btn:active {
            background: rgba(255,255,255,0.45);
            transform: scale(0.95);
        }

        .load-resource-btn {
            position: absolute;
            top: 60px;
            right: 16px;
            background: rgba(255,255,255,0.15);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            z-index: 10;
        }

        .load-resource-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .load-resource-btn:active {
            background: rgba(255,255,255,0.45);
            transform: scale(0.95);
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #90EE90;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        #loading-screen.show {
            opacity: 1;
        }

        .studio-name {
            color: #FFFFFF;
            font-size: 2.8rem;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255,255,255,1), 0 0 60px rgba(255,255,255,0.7);
            margin-bottom: 25px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .loading-text {
            color: #FFFFFF;
            font-size: 1.15rem;
            text-shadow: 0 0 12px rgba(255,255,255,0.9);
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 50;
            background: #000;
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        #float-ball {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 0.85rem;
            font-weight: bold;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            z-index: 200;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            line-height: 1.2;
            padding: 4px;
        }

        #float-ball.dragging {
            opacity: 0.8;
            cursor: grabbing;
        }

        #confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .modal-content {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 30px 40px;
            text-align: center;
            min-width: 260px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-text {
            color: #333;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .modal-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 30px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            height: 42px;
            line-height: 1;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .btn-yes {
            background: #ff4444;
            color: #FFFFFF;
        }

        .btn-yes:hover {
            background: #ff2222;
        }

        .btn-no {
            background: #e0e0e0;
            color: #333;
        }

        .btn-no:hover {
            background: #d0d0d0;
        }

        /* 白底黑框弹窗样式（更新提示 & 清理成功） */
        .info-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 350;
        }

        .info-modal-content {
            background: #FFFFFF;
            border: 2px solid #000000;
            border-radius: 12px;
            padding: 28px 32px;
            text-align: center;
            max-width: 320px;
            width: 85%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }

        .info-modal-text {
            color: #000000;
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .info-modal-btn {
            background: #000000;
            color: #FFFFFF;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .info-modal-btn:hover {
            background: #333333;
        }

        .info-modal-btn:active {
            transform: scale(0.96);
        }

        /* 版本选择界面 */
        #version-picker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #90EE90;
            display: none;
            flex-direction: column;
            z-index: 400;
            overflow: hidden;
        }

        .picker-header {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

        .picker-cancel-btn {
            background: rgba(255,255,255,0.15);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 32px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .picker-cancel-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .picker-cancel-btn:active {
            background: rgba(255,255,255,0.45);
            transform: scale(0.95);
        }

        .picker-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 8px 0;
        }

        .picker-item {
            color: #FFFFFF;
            font-size: 1.15rem;
            font-weight: 500;
            text-align: center;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            position: relative;
            transition: background 0.1s;
        }

        .picker-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .picker-item:active {
            background: rgba(255,255,255,0.2);
        }

        .picker-item::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 15%;
            width: 70%;
            height: 1px;
            background: rgba(255,255,255,0.6);
        }

        .picker-item:last-child::after {
            display: none;
        }

        .picker-item.selected {
            background: rgba(255,255,255,0.2);
        }

        /* 资源加载界面 */
        #resource-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #90EE90;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 400;
        }

        .loader-cancel-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.15);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            z-index: 10;
        }

        .loader-cancel-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .loader-cancel-btn:active {
            background: rgba(255,255,255,0.45);
            transform: scale(0.95);
        }

        .loader-title {
            color: #FFFFFF;
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
            margin-bottom: 30px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .progress-bar-container {
            width: 70%;
            max-width: 320px;
            height: 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .progress-bar-fill {
            height: 100%;
            background: #FFFFFF;
            border-radius: 6px;
            width: 0%;
            transition: width 0.2s ease;
            box-shadow: 0 0 10px rgba(255,255,255,0.6);
        }

        .loader-current-file {
            color: #FFFFFF;
            font-size: 1rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.7);
            text-align: center;
            min-height: 1.5rem;
            user-select: none;
            -webkit-user-select: none;
        }

        .loader-status {
            color: #FFFFFF;
            font-size: 0.9rem;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
            text-align: center;
            margin-top: 12px;
            opacity: 0.8;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

    <div id="main-screen">
        <button class="top-right-btn" id="clearCacheBtn">清理缓存</button>
        <button class="load-resource-btn" id="loadResourceBtn">加载资源</button>
        <div class="title">Sodium <span class="emoji-fire">🔥</span> 方块 启动器 2.0</div>
        <button class="version-select-btn" id="versionSelectBtn">1.5.5</button>
        <button class="launch-btn" id="launchBtn">启动</button>
        <div class="copyright-text">版权所有：坤坤工作室/团体   禁止二次分发</div>
    </div>

    <div id="loading-screen">
        <div class="studio-name">🏀坤坤工作室</div>
        <div class="loading-text" id="loadingText">检查依赖……</div>
    </div>

    <div id="game-container">
        <iframe id="game-frame" sandbox="allow-scripts allow-same-origin allow-pointer-lock"></iframe>
    </div>

    <div id="float-ball">长按<br>退出</div>

    <div id="confirm-modal">
        <div class="modal-content">
            <div class="modal-text">是否退出</div>
            <div class="modal-btns">
                <button class="modal-btn btn-yes" id="btnYes">是</button>
                <button class="modal-btn btn-no" id="btnNo">否</button>
            </div>
        </div>
    </div>

    <!-- 2.0更新提示弹窗 -->
    <div class="info-modal" id="updateModal">
        <div class="info-modal-content">
            <div class="info-modal-text">欢迎！ 本次更新了 1.56版 ，新增了下界！还有三个番外游戏 溶洞2.0 、 后室 1.4 和 解压打球 3.0 还有插件功能！希望你玩得开心</div>
            <button class="info-modal-btn" id="updateModalBtn">开始体验</button>
        </div>
    </div>

    <!-- 清理成功弹窗 -->
    <div class="info-modal" id="clearSuccessModal">
        <div class="info-modal-content">
            <div class="info-modal-text">缓存清理成功！</div>
            <button class="info-modal-btn" id="clearSuccessModalBtn">确定</button>
        </div>
    </div>

    <!-- 版本选择界面 -->
    <div id="version-picker">
        <div class="picker-header">
            <button class="picker-cancel-btn" id="pickerCancelBtn">取消</button>
        </div>
        <div class="picker-list" id="pickerList"></div>
    </div>

    <!-- 资源加载界面 -->
    <div id="resource-loader">
        <button class="loader-cancel-btn" id="loaderCancelBtn">取消</button>
        <div class="loader-title">正在加载PNG资源……</div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
        <div class="loader-current-file" id="loaderCurrentFile"></div>
        <div class="loader-status" id="loaderStatus"></div>
    </div>

    <script>
        const versionSelectBtn = document.getElementById('versionSelectBtn');
        const launchBtn = document.getElementById('launchBtn');
        const mainScreen = document.getElementById('main-screen');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loadingText');
        const gameContainer = document.getElementById('game-container');
        const gameFrame = document.getElementById('game-frame');
        const floatBall = document.getElementById('float-ball');
        const confirmModal = document.getElementById('confirm-modal');
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const clearCacheBtn = document.getElementById('clearCacheBtn');
        const loadResourceBtn = document.getElementById('loadResourceBtn');
        const updateModal = document.getElementById('updateModal');
        const updateModalBtn = document.getElementById('updateModalBtn');
        const clearSuccessModal = document.getElementById('clearSuccessModal');
        const clearSuccessModalBtn = document.getElementById('clearSuccessModalBtn');
        const versionPicker = document.getElementById('version-picker');
        const pickerList = document.getElementById('pickerList');
        const pickerCancelBtn = document.getElementById('pickerCancelBtn');
        const resourceLoader = document.getElementById('resource-loader');
        const progressBarFill = document.getElementById('progressBarFill');
        const loaderCurrentFile = document.getElementById('loaderCurrentFile');
        const loaderStatus = document.getElementById('loaderStatus');
        const loaderCancelBtn = document.getElementById('loaderCancelBtn');

        const versionData = [
            { name: '1.5.6', file: 'Three1.5.6.html' },
            { name: '1.5.5', file: 'Three1.5.5.html' },
            { name: '1.5', file: 'Three1.5.html' },
            { name: '1.4', file: 'Three1.4.html' },
            { name: '1.2', file: 'Three1.2.html' },
            { name: 'Sodium1.5.5区块渲染器', file: 'Sodium1.5.5.html' },
            { name: '番外-溶洞2.0', file: 'Cave2.0.html' },
            { name: '番外-后室1.4', file: 'backrooms1.4.html' },
            { name: '番外-解压打击球', file: 'hurtkimi3.0.html' },
            { name: '草原漫步 1.0', file: '94.html' }
        ];

        let currentVersionIndex = 0;
        let isLaunching = false;
        let isLoadingResources = false;
        let resourceAbortController = null;

        const TEXTURE_BASE_URL = 'https://cdn.jsdmirror.com/gh/Faithful-Pack/Default-Java@1.21.11/assets/minecraft/textures/block/';
        
        const textureList = [
            { display: '土块', file: 'dirt.png' },
            { display: '石头', file: 'stone.png' },
            { display: '基岩', file: 'bedrock.png' },
            { display: '橡木原木顶面', file: 'oak_log_top.png' },
            { display: '橡木原木侧面', file: 'oak_log.png' },
            { display: '下界岩', file: 'netherrack.png' },
            { display: '诡异菌柄顶面', file: 'warped_stem_top.png' },
            { display: '诡异菌柄侧面', file: 'warped_stem.png' },
            { display: '绯红菌柄顶面', file: 'crimson_stem_top.png' },
            { display: '绯红菌柄侧面', file: 'crimson_stem.png' },
            { display: '诡异树叶', file: 'warped_wart_block.png' },
            { display: '绯红树叶', file: 'nether_wart_block.png' },
            { display: '诡异菌岩顶面', file: 'warped_nylium_top.png' },
            { display: '诡异菌岩侧面', file: 'warped_nylium_side.png' },
            { display: '绯红菌岩顶面', file: 'crimson_nylium_top.png' },
            { display: '绯红菌岩侧面', file: 'crimson_nylium_side.png' },
            { display: '黑曜石', file: 'obsidian.png' },
            { display: 'TNT顶面', file: 'tnt_top.png' },
            { display: 'TNT底面', file: 'tnt_bottom.png' },
            { display: 'TNT侧面', file: 'tnt_side.png' },
            { display: '橡树树叶', file: 'oak_leaves.png' },
            { display: '草方块顶面', file: 'grass_block_top.png' },
            { display: '草方块侧面', file: 'grass_block_side.png' }
        ];

        // 初始化版本选择按钮显示
        versionSelectBtn.textContent = versionData[currentVersionIndex].name;

        // 检查更新提示
        function checkUpdateNotice() {
            try {
                const notified = localStorage.getItem('2.0更新提示已通知');
                if (!notified) {
                    updateModal.style.display = 'flex';
                }
            } catch (e) {
                console.warn('localStorage不可用');
            }
        }

        // 页面加载完成后检查更新提示
        window.addEventListener('load', checkUpdateNotice);

        // 更新提示弹窗按钮
        function onUpdateModalBtnClick(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            try {
                localStorage.setItem('2.0更新提示已通知', 'true');
            } catch (e) {
                console.warn('localStorage写入失败');
            }
            updateModal.style.display = 'none';
        }

        updateModalBtn.addEventListener('click', onUpdateModalBtnClick);
        updateModalBtn.addEventListener('touchstart', onUpdateModalBtnClick, { passive: false });

        // 清理成功弹窗按钮
        function onClearSuccessBtnClick(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            clearSuccessModal.style.display = 'none';
        }

        clearSuccessModalBtn.addEventListener('click', onClearSuccessBtnClick);
        clearSuccessModalBtn.addEventListener('touchstart', onClearSuccessBtnClick, { passive: false });

        // 清理缓存
        function clearAllCache(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            try {
                localStorage.clear();
                clearSuccessModal.style.display = 'flex';
            } catch (err) {
                alert('清理缓存失败: ' + err.message);
            }
        }

        clearCacheBtn.addEventListener('click', clearAllCache);
        clearCacheBtn.addEventListener('touchstart', clearAllCache, { passive: false });

        // 版本选择界面
        function openVersionPicker() {
            pickerList.innerHTML = '';
            versionData.forEach((v, idx) => {
                const item = document.createElement('div');
                item.className = 'picker-item';
                item.textContent = v.name;
                if (idx === currentVersionIndex) {
                    item.classList.add('selected');
                }
                
                let startTime = 0;
                let startY = 0;
                let hasMoved = false;
                let touchId = null;

                function onPointerDown(ev) {
                    const pos = getClientPos(ev);
                    startTime = Date.now();
                    startY = pos.y;
                    hasMoved = false;
                    if (ev.touches) {
                        touchId = ev.touches[0].identifier;
                    }
                }

                function onPointerMove(ev) {
                    const pos = getClientPos(ev);
                    if (Math.abs(pos.y - startY) > 10) {
                        hasMoved = true;
                    }
                }

                function onPointerUp(ev) {
                    const dt = Date.now() - startTime;
                    if (!hasMoved && dt < 200) {
                        ev.preventDefault && ev.preventDefault();
                        ev.stopPropagation && ev.stopPropagation();
                        selectVersion(idx);
                    }
                }

                item.addEventListener('mousedown', onPointerDown);
                item.addEventListener('mousemove', onPointerMove);
                item.addEventListener('mouseup', onPointerUp);
                
                item.addEventListener('touchstart', onPointerDown, { passive: true });
                item.addEventListener('touchmove', onPointerMove, { passive: true });
                item.addEventListener('touchend', (ev) => {
                    ev.preventDefault();
                    onPointerUp(ev);
                }, { passive: false });

                pickerList.appendChild(item);
            });
            versionPicker.style.display = 'flex';
        }

        function selectVersion(index) {
            currentVersionIndex = index;
            versionSelectBtn.textContent = versionData[index].name;
            versionPicker.style.display = 'none';
        }

        function closeVersionPicker() {
            versionPicker.style.display = 'none';
        }

        versionSelectBtn.addEventListener('click', openVersionPicker);
        versionSelectBtn.addEventListener('touchstart', (e) => { e.preventDefault(); openVersionPicker(); }, { passive: false });
        pickerCancelBtn.addEventListener('click', closeVersionPicker);
        pickerCancelBtn.addEventListener('touchstart', (e) => { e.preventDefault(); closeVersionPicker(); }, { passive: false });

        // 资源加载
        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        async function loadResources() {
            if (isLoadingResources) return;
            isLoadingResources = true;
            resourceAbortController = new AbortController();
            const signal = resourceAbortController.signal;

            resourceLoader.style.display = 'flex';
            progressBarFill.style.width = '0%';
            loaderCurrentFile.textContent = '';
            loaderStatus.textContent = '';

            const total = textureList.length;
            const cachedData = {};
            let successCount = 0;
            let failCount = 0;

            for (let i = 0; i < total; i++) {
                if (signal.aborted) {
                    loaderStatus.textContent = '已取消';
                    isLoadingResources = false;
                    return;
                }

                const tex = textureList[i];
                loaderCurrentFile.textContent = '正在缓存：' + tex.display;
                progressBarFill.style.width = Math.round(((i) / total) * 100) + '%';

                try {
                    const url = TEXTURE_BASE_URL + tex.file;
                    const response = await fetch(url, { signal });
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const blob = await response.blob();
                    const base64 = await blobToBase64(blob);
                    cachedData[tex.file] = base64;
                    successCount++;
                } catch (err) {
                    if (signal.aborted) {
                        loaderStatus.textContent = '已取消';
                        isLoadingResources = false;
                        return;
                    }
                    failCount++;
                    console.warn('加载失败:', tex.file, err.message);
                }
            }

            progressBarFill.style.width = '100%';
            loaderCurrentFile.textContent = '';
            
            try {
                localStorage.setItem('kk_textures', JSON.stringify(cachedData));
                loaderStatus.textContent = '加载完成！成功 ' + successCount + ' 个' + (failCount > 0 ? '，失败 ' + failCount + ' 个' : '');
            } catch (err) {
                loaderStatus.textContent = '缓存保存失败: ' + err.message;
            }

            setTimeout(() => {
                resourceLoader.style.display = 'none';
                isLoadingResources = false;
                resourceAbortController = null;
            }, 1500);
        }

        function cancelLoadResources() {
            if (resourceAbortController) {
                resourceAbortController.abort();
            }
            resourceLoader.style.display = 'none';
            isLoadingResources = false;
            resourceAbortController = null;
        }

        loadResourceBtn.addEventListener('click', loadResources);
        loadResourceBtn.addEventListener('touchstart', (e) => { e.preventDefault(); loadResources(); }, { passive: false });
        loaderCancelBtn.addEventListener('click', cancelLoadResources);
        loaderCancelBtn.addEventListener('touchstart', (e) => { e.preventDefault(); cancelLoadResources(); }, { passive: false });

        function resetToMain() {
            gameFrame.src = '';
            gameContainer.style.display = 'none';
            floatBall.style.display = 'none';
            loadingScreen.style.display = 'none';
            loadingScreen.classList.remove('show');
            mainScreen.style.display = 'flex';
            isLaunching = false;
        }

        function handleLaunch(e) {
            if (isLaunching) return;
            isLaunching = true;
            if (e && e.type === 'touchstart') e.preventDefault();

            mainScreen.style.display = 'none';
            loadingScreen.style.display = 'flex';
            void loadingScreen.offsetWidth;
            loadingScreen.classList.add('show');

            const version = versionData[currentVersionIndex];

            setTimeout(() => {
                loadingText.textContent = '检查依赖……（随后3s后开始正转）';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    loadingScreen.classList.remove('show');

                    if (version && version.file) {
                        gameFrame.src = version.file;
                        gameContainer.style.display = 'block';
                        floatBall.style.display = 'flex';
                    }
                }, 3000);
            }, 50);
        }

        launchBtn.addEventListener('click', handleLaunch);
        launchBtn.addEventListener('mousedown', handleLaunch);
        launchBtn.addEventListener('touchstart', handleLaunch, { passive: false });

        // 悬浮球拖动 + 长按/点击
        let dragState = {
            isDragging: false,
            startX: 0, startY: 0,
            ballLeft: 0, ballTop: 0,
            startTime: 0,
            hasMoved: false,
            longPressTimer: null
        };

        const LONG_PRESS_TIME = 800;
        const MOVE_THRESHOLD = 10;

        function getClientPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function onBallDown(e) {
            e.preventDefault();
            e.stopPropagation();
            const pos = getClientPos(e);
            const rect = floatBall.getBoundingClientRect();

            dragState.isDragging = true;
            dragState.hasMoved = false;
            dragState.startX = pos.x;
            dragState.startY = pos.y;
            dragState.ballLeft = rect.left;
            dragState.ballTop = rect.top;
            dragState.startTime = Date.now();

            floatBall.classList.add('dragging');

            dragState.longPressTimer = setTimeout(() => {
                if (dragState.isDragging && !dragState.hasMoved) {
                    dragState.isDragging = false;
                    floatBall.classList.remove('dragging');
                    resetToMain();
                }
            }, LONG_PRESS_TIME);
        }

        function onBallMove(e) {
            if (!dragState.isDragging) return;
            const pos = getClientPos(e);
            const dx = pos.x - dragState.startX;
            const dy = pos.y - dragState.startY;

            if (Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD) {
                dragState.hasMoved = true;
                if (dragState.longPressTimer) {
                    clearTimeout(dragState.longPressTimer);
                    dragState.longPressTimer = null;
                }
            }

            floatBall.style.left = (dragState.ballLeft + dx) + 'px';
            floatBall.style.top = (dragState.ballTop + dy) + 'px';
            floatBall.style.transform = 'none';
        }

        function onBallUp(e) {
            if (!dragState.isDragging) return;

            if (dragState.longPressTimer) {
                clearTimeout(dragState.longPressTimer);
                dragState.longPressTimer = null;
            }

            const wasDragging = dragState.isDragging;
            dragState.isDragging = false;
            floatBall.classList.remove('dragging');

            if (wasDragging && !dragState.hasMoved && (Date.now() - dragState.startTime < LONG_PRESS_TIME)) {
                confirmModal.style.display = 'flex';
            }
        }

        floatBall.addEventListener('mousedown', onBallDown);
        floatBall.addEventListener('touchstart', onBallDown, { passive: false });

        document.addEventListener('mousemove', onBallMove);
        document.addEventListener('touchmove', onBallMove, { passive: false });

        document.addEventListener('mouseup', onBallUp);
        document.addEventListener('touchend', onBallUp);

        // 弹窗按钮
        function onYes(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            confirmModal.style.display = 'none';
            resetToMain();
        }

        function onNo(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            confirmModal.style.display = 'none';
        }

        btnYes.addEventListener('click', onYes);
        btnYes.addEventListener('mousedown', onYes);
        btnYes.addEventListener('touchstart', onYes, { passive: false });

        btnNo.addEventListener('click', onNo);
        btnNo.addEventListener('mousedown', onNo);
        btnNo.addEventListener('touchstart', onNo, { passive: false });
    </script>
</body>
</html>
